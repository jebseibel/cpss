databaseChangeLog:
  - changeSet:
      id: create_password_reset_token_table
      author: claude
      labels: authentication
      changes:

        # Password Reset Token Table
        - createTable:
            tableName: password_reset_token
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: extid, type: varchar(36), constraints: { nullable: false, unique: true }, defaultValueComputed: "(UUID())" }
              - column: { name: user_extid, type: varchar(36), constraints: { nullable: false } }
              - column: { name: token, type: varchar(36), constraints: { nullable: false, unique: true } }
              - column: { name: expires_at, type: datetime, constraints: { nullable: false } }
              - column: { name: used, type: boolean, constraints: { nullable: false }, defaultValueBoolean: false }
              - column: { name: created_at, type: datetime, constraints: { nullable: false }, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: datetime }
              - column: { name: deleted_at, type: datetime }
              - column: { name: active, type: int, defaultValueNumeric: 1 }

        # Create index on token for fast lookups
        - createIndex:
            indexName: idx_password_reset_token_token
            tableName: password_reset_token
            columns:
              - column: { name: token }

        # Create index on user_extid for cleanup queries
        - createIndex:
            indexName: idx_password_reset_token_user_extid
            tableName: password_reset_token
            columns:
              - column: { name: user_extid }

        # Add foreign key constraint to users table
        - addForeignKeyConstraint:
            constraintName: fk_password_reset_token_user
            baseTableName: password_reset_token
            baseColumnNames: user_extid
            referencedTableName: users
            referencedColumnNames: extid
            onDelete: CASCADE
